# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: pg-storage-orders-db-0
#   # [VolumeClaimTemplate Name]-[StatefulSet Name]-[Pod Index]
#   namespace: retail-app
# spec:
#   accessModes:
#     - ReadWriteOnce
#   storageClassName: ebs-retain-sc
#   resources:
#     requests:
#       storage: 5Gi
#   volumeName: postgres-pv # Explicitly point to the PV above
  
---  

apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: standard # Kind's default storage class
  hostPath:
    path: /var/local-path-provisioner # This points to the mount INSIDE the Kind node   

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pg-storage-orders-db-0
  # [VolumeClaimTemplate Name]-[StatefulSet Name]-[Pod Index]
  namespace: retail-app
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
  volumeName: postgres-pv # Explicitly point to the PV above
