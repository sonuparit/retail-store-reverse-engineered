apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso
  namespace: argocd
  
spec:
  project: platform
  source:
    repoURL: https://github.com/sonuparit/retail-store-reverse-engineered.git
    path: my-work/02-platform/eso
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]