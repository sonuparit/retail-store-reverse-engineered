apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: retail-matrix
  namespace: argocd
spec:
  # 1. Define the strategy for Progressive Rollouts
  strategy:
    type: RollingUpdate
    rollingUpdate:
      steps:
        - matchExpressions:
            - key: wave
              operator: In
              values:
                - "2" # ArgoCD waits for 'secrets' (Wave 2) to be Healthy
        - matchExpressions:
            - key: wave
              operator: In
              values:
                - "3" # Then it moves to carts, catalog, etc. (Wave 3)
        - matchExpressions:
            - key: wave
              operator: In
              values:
                - "4" # Finally it deploys the UI (Wave 4)

  generators:
    - matrix:
        generators:
          # 🔹 Services
          - list:
              elements:
                - name: secrets
                  chartPath: "charts/secret-configs"
                  wave: "2" # Matches the first step above
                  
                - name: carts
                  chartPath: charts/carts
                  wave: "3" # Matches the second step

                - name: catalog
                  chartPath: charts/catalog
                  wave: "3"

                - name: checkout
                  chartPath: charts/checkout
                  wave: "3"

                - name: orders
                  chartPath: charts/orders
                  wave: "3"

                - name: ui
                  chartPath: charts/ui
                  wave: "4" # Matches the third step

          # 🔹 Environments
          - list:
              elements:
                - env: dev
                  namespace: dev
#                - env: stage
#                  namespace: stage
#                - env: prod
#                  namespace: prod

  template:
    metadata:
      name: "{{name}}-{{env}}"
      labels:
        # CRITICAL: The strategy uses these labels to group the apps
        wave: "{{wave}}" 
        app.kubernetes.io/name: "{{name}}"
        env: "{{env}}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{wave}}"

    spec:
      project: retail-app
      source:
        repoURL: https://github.com/sonuparit/retail-store-reverse-engineered.git
        targetRevision: main
        path: 04-applications/kubernetes/argocd-deploy/apps/{{chartPath}}
        helm:
          valueFiles:
            - ../../../envs/{{env}}/{{name}}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true