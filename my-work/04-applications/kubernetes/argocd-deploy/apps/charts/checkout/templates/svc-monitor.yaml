# service-monitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: {{ include "checkout.fullname" . }}-svc-mon

  labels:
    release: kube-prometheus-stack

spec:
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}

  selector:
    matchLabels:
      {{- include "checkout.selectorLabels" . | nindent 6 }}

  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    
    relabelings:
    - targetLabel: env
      replacement: {{ .Release.Namespace }}