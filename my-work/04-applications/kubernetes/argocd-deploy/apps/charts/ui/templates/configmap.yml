{{- if .Values.configMap.create -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ui.configMapName" . }}
data:
  # Pattern: http://[Chart]-service:[Port]
  {{- range $key, $value := .Values.env.endpoints }}
  RETAIL_UI_ENDPOINTS_{{ $key | upper }}: {{ $value | quote }}
  {{- end }}
{{- end }}
