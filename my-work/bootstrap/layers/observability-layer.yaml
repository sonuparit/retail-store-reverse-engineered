apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-layer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # Deployment Order #2
spec:
  project: observability
  source:
    repoURL: https://github.com/sonuparit/retail-store-reverse-engineered.git
    path: my-work/03-observability
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
