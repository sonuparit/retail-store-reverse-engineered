apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  
spec:
  description: Project for platform layer deployment
  
  sourceRepos:
    - 'https://github.com/sonuparit/retail-store-reverse-engineered.git' # Restrict to repo only
    - 'https://charts.external-secrets.io'
    
  destinations:
    # namespace platform, external-secrets, argocd
    - namespace: '*'
      server: https://kubernetes.default.svc
      
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
      
---

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
  
spec:
  description: Project for observability layer deployment
  
  sourceRepos:
    - '*'
    # https://github.com/sonuparit/retail-store-reverse-engineered.git' # Restrict to my repo
    # https://prometheus-community.github.io/helm-charts' # Allow official Helm repos
    # https://kubernetes-sigs.github.io/metrics-server' # Allow metrics-server repos
    # https://grafana.github.io/helm-charts' # Allow grafana loki repos
    
  destinations:
    # namespace observability, argocd, external-secrets, kubesystem, etc
    - namespace: '*'
      server: https://kubernetes.default.svc
  # Monitoring needs to create ClusterRoles and CRDs
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
      
---

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: retail-app
  namespace: argocd
  
spec:
  description: Project for Retail Store (Application) deployment
  
  sourceRepos:
    - 'https://github.com/sonuparit/retail-store-reverse-engineered.git'
    - 'https://charts.external-secrets.io'
    
  destinations:
    # namespace dev, stage, prod, external-secrets, argocd etc
    - namespace: 'retail-app'
      server: https://kubernetes.default.svc
    - namespace: 'dev'
      server: https://kubernetes.default.svc
    - namespace: 'stage'
      server: https://kubernetes.default.svc
    - namespace: 'prod'
      server: https://kubernetes.default.svc
    - namespace: 'external-secrets'
      server: https://kubernetes.default.svc
    - namespace: 'argocd'
      server: https://kubernetes.default.svc
      
  clusterResourceWhitelist:
    - group: '*'
      kind: '*' # Required for ClusterSecretStore
      
---

