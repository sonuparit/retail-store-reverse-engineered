apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # 🔹 Total-Locking Health assessment to eliminate timing uncertainties
  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    
    -- 1. Structural Catch: If status fields don't exist yet, halt immediately.
    if obj.status == nil or obj.status.health == nil or obj.status.health.status == nil then
      hs.status = "Progressing"
      hs.message = "Sync Lock: Initializing health and synchronization status structures..."
      return hs
    end

    local health_status = obj.status.health.status
    local sync_status = (obj.status.sync and obj.status.sync.status) or "Unknown"

    -- 2. Prevent Premature Clearance: If the app says Healthy but is STILL Syncing manifests, LOCK IT.
    if sync_status == "OutOfSync" or sync_status == "Unknown" then
      hs.status = "Progressing"
      hs.message = "Sync Lock: Controller is actively transmitting or reconciling manifests. Current Sync State: " .. sync_status
      return hs
    end

    -- 3. Hard Halt on Failure: If ANY resource inside this layer goes Degraded, fail immediately
    -- to prevent your root-app from silently swallowing the error and moving on.
    if health_status == "Degraded" then
      hs.status = "Degraded"
      hs.message = "CRITICAL: Underling layer resources have entered a Degraded state."
      return hs
    end

    -- 4. The Ultimate Gatekeeper: Even if health is 'Healthy', double-check that it is 
    -- also fully 'Synced'. If it is 'OutOfSync', background modifications are happening. Lock it.
    if health_status ~= "Healthy" or sync_status ~= "Synced" then
      hs.status = "Progressing"
      hs.message = "Sync Lock: Layer is unstable or out-of-sync. (Health: " .. health_status .. ", Sync: " .. sync_status .. ")"
      return hs
    end

    -- 5. Only when it is explicitly Healthy AND fully Synced do we unlock the wave
    hs.status = "Healthy"
    hs.message = "Layer is 100% Synced, static, and running green."
    return hs