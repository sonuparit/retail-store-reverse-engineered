apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # 🔹 Enforce health checks on the Application resource type itself
  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    if obj.status ~= nil and obj.status.health ~= nil then
      -- Capture the current child application health status
      local status = obj.status.health.status
      hs.status = status
      
      if obj.status.health.message ~= nil then
        hs.message = obj.status.health.message
      end
      
      -- If the child app is Synced but still initializing pods, mark it as Progressing
      if status == "Progressing" then
        hs.message = "Waiting for all underlying pods and deployments to become ready."
        return hs
      elseif status == "Degraded" then
        hs.message = "Child application deployment has failed or degraded."
        return hs
      elseif status == "Missing" then
        hs.status = "Progressing"
        hs.message = "Child application resources are missing from the cluster. Initializing..."
        return hs
      end
      
      return hs
    end
    
    -- Fallback safety state if status has not yet been populated by the controller
    hs.status = "Progressing"
    hs.message = "Initializing child application tree loop..."
    return hs