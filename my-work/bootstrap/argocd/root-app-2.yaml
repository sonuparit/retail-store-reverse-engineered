apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-infrastructure-bootstrap
  namespace: argocd
  
spec:
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: tier
              operator: In
              values: ["platform"]       # Step 1: Wait until this is 100% Healthy
          maxUpdate: 1
          
        - matchExpressions:
            - key: tier
              operator: In
              values: ["observability"]  # Step 2: Then trigger this tier
          maxUpdate: 1

  # 2. The Blueprint Matrix
  generators:
    - list:
        elements:
          - layer: platform-layer
            path: my-work/02-platform/manifests
            project: platform
            tier: platform

          - layer: observability-layer
            path: my-work/03-observability/manifests
            project: observability
            tier: observability

  # 3. The Target Application Template
  template:
    metadata:
      name: "{{layer}}"
      namespace: argocd
      labels:
        tier: "{{tier}}" 
        
    spec:
      project: "{{project}}"
      source:
        repoURL: https://github.com/sonuparit/retail-store-reverse-engineered.git
        targetRevision: main
        path: "{{path}}"
        
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
        
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true