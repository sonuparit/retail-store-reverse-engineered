apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-applicationset-controller
  namespace: argocd
  labels:
    release: kube-prometheus-stack
  
spec:

  namespaceSelector:
    matchNames:
    - argocd
    
  selector:
    matchLabels:
      app: argocd-applicationset-controller-metrics
      
  endpoints:
  - interval: 30s
    path: /metrics
    port: http-metrics