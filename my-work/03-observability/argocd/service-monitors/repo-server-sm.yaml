apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: argocd-repo-server
  namespace: argocd
  labels:
    release: kube-prometheus-stack
  
spec:
    
  namespaceSelector:
    matchNames:
    - argocd
    
  selector:
    matchLabels:
      app: argocd-repo-server-metrics
      
  endpoints:
  - interval: 30s
    path: /metrics
    port: http-metrics