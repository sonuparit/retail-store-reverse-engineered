apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: basic-k8s--alerts
  namespace: argocd
  
spec:
  project: observability
  source:
    repoURL: https://github.com/sonuparit/retail-store-reverse-engineered.git
    path: my-work/03-observability/alertmanager/kubernetes/
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
    
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]