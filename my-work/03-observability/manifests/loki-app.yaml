apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  
spec:
  project: observability
  sources:
    - repoURL: 'https://grafana.github.io/helm-charts'
      chart: loki-stack
      targetRevision: 2.9.11
      helm:
        valueFiles:
          - $values/my-work/03-observability/loki/loki-values.yaml
          - $values/my-work/03-observability/loki/promtail-values.yaml

    - repoURL: 'https://github.com/sonuparit/retail-store-reverse-engineered.git'
      targetRevision: main
      ref: values
        
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
    
  syncPolicy:
    automated: 
      prune: true 
      selfHeal: true
    syncOptions:
      - CreateNamespace=true