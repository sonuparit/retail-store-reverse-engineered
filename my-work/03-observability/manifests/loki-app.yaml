apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  
spec:
  project: observability
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki-stack
    targetRevision: 2.9.11
    helm:
      valueFiles:
        - https://github.com/sonuparit/retail-store-reverse-engineered/tree/main/my-work/03-observability/loki
        
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
    
  syncPolicy:
    automated: 
      prune: true 
      selfHeal: true
    syncOptions:
      - CreateNamespace=true