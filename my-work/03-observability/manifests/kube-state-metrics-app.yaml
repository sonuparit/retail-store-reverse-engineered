apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
spec:
  project: observability 
  
  sources:
    # Source 1: The Upstream Helm Chart
    - repoURL: 'https://kubernetes-sigs.github.io/metrics-server'
      chart: metrics-server
      targetRevision: 3.12.1
      helm:
        valueFiles:
          - $values/my-work/03-observability/kube-state-metrics/metrics-server.yaml # 👈 Local reference to Source 2

    # Source 2: Private Configuration Git Repo
    - repoURL: 'https://github.com/sonuparit/retail-store-reverse-engineered.git'
      targetRevision: main
      ref: values # 👈 Defines the alias '$values' used above

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability 

  syncPolicy:
    automated: 
      prune: true 
      selfHeal: true
    syncOptions:
      - CreateNamespace=true