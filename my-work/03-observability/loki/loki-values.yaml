# loki-values.yaml

loki:

  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2025-01-01"

        store: tsdb
        object_store: filesystem
        schema: v13

        index:
          prefix: loki_index_
          period: 24h

  limits_config:

    # Ingestion protection
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16

    # Query protection
    max_query_parallelism: 4

    # Retention
    retention_period: 168h

    # Reject stale logs
    reject_old_samples: true
    reject_old_samples_max_age: 168h

  compactor:

    working_directory: /var/loki/compactor

    retention_enabled: true

    delete_request_store: filesystem

  ruler:
    enable_api: true

deploymentMode: SingleBinary

singleBinary:

  replicas: 1

  persistence:

    enabled: true

    accessModes:
      - ReadWriteOnce

    size: 10Gi

    storageClass: standard

  resources:

    requests:
      cpu: 200m
      memory: 512Mi

    limits:
      cpu: 500m
      memory: 1Gi

gateway:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

monitoring:

  dashboards:
    enabled: true

  rules:
    enabled: true

  serviceMonitor:
    enabled: true

  selfMonitoring:
    enabled: false

test:
  enabled: false