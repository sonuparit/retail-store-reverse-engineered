defaultRules:
  # false - Disable all default rules
  create: true
  rules:
    kubelet: false
    etcd: false
    # Disable the Watchdog alert:
    # watchdog: false

prometheus:
  enabled: true
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: [ "ReadWriteOnce" ]
          resources:
            requests:
              storage: 1Gi
    serviceMonitorSelectorNilUsesHelmValues: false

grafana:
  enabled: true
  adminPassword: admin123
  service:
    type: ClusterIP
  persistence:
    enabled: true
    storageClassName: standard
    size: 1Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

