apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-deployment
  namespace: retail-app
  labels:
    app: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: sonuparit/retail-app:orders-small
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        
        # resources to limit the pod
        resources:
          limits:
            cpu: 256m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
            
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop: ["ALL"]
            add: ["NET_BIND_SERVICE"]
        env:
        
        # postgreSQL
        - name: RETAIL_ORDERS_PERSISTENCE_PROVIDER
          value: "postgres"
        - name: RETAIL_ORDERS_PERSISTENCE_ENDPOINT
          value: "orders-db-0.orders-db:5432"
        - name: RETAIL_ORDERS_PERSISTENCE_NAME
          value: "orders"
        - name: RETAIL_ORDERS_PERSISTENCE_USERNAME
          value: "orders_user"
        - name: RETAIL_ORDERS_PERSISTENCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: retail-secrets
              key: db-password
          
        # rabbitMQ
        - name: RETAIL_ORDERS_MESSAGING_PROVIDER
          value: "in-memory" # [default = in-memory | rabbitmq]
        - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES
          value: ""
        - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_USERNAME
          value: ""
        - name: RETAIL_ORDERS_MESSAGING_RABBITMQ_PASSWORD
          value: ""
          
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
        
      volumes:
      - name: tmp-volume
        emptyDir:
          medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: orders-service
  namespace: retail-app
spec:
  selector:
    app: orders
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
