replicaCount: 1

image:
  repository: sonuparit/retail-app
  pullPolicy: IfNotPresent
  tag: "orders-small"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

configMap:
  create: true
  name:
env:
  orders:
  # persistent database
    provider: "postgres"
    endpoint:
    name: "orders"
    username: # from AWS secrets manager
    password: # from AWS secrets manager
  # not using RabbitMQ
  rabbitmq:
    provider: "in-memory"
    address: ""
    username: ""
    password: ""
  postgres:
    pgdata: "/var/lib/postgresql/data/pgdata"

stsSecurityContext:
  fsGroup: 999

dbImage:
  image: "postgres"
  tag: "16.1"
  port: 5432
  
dbReadinessProbe:
  exec:
    command: ["pg_isready", "-d", "orders", "-U", "orders_user"]
  initialDelaySeconds: 10
  periodSeconds: 10

volume:
  name: "pg-storage"
  path: "/var/lib/postgresql/data"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers

resources:
  limits:
    cpu: 256m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 30
  timeoutSeconds: 5
  
# readinessProbe:
#   httpGet:
#     path: /
#     port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes:
- name: tmp-volume
  emptyDir:
    medium: Memory

volumeMounts:
- name: tmp-volume
  mountPath: /tmp
  
db:
  createStorageClass: false # false for kind
  storageClass: "standard" # For KinD
  storageSize: 5Gi
  hostPath: "/var/local-path-provisioner"

nodeSelector: {}

tolerations: []

affinity: {}
