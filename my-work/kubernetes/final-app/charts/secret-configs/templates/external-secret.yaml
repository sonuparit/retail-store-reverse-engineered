#    - secretKey: RETAIL_ORDERS_PERSISTENCE_USERNAME  # Name in K8s
#      remoteRef:
#        key: prod/orders/postgres # The "box" in AWS
#        property: DB_USER # The "Key" in AWS

    # This maps the Password
#    - secretKey: RETAIL_ORDERS_PERSISTENCE_PASSWORD  # Name in K8s
#      remoteRef:
#        key: prod/orders/postgres # The "box" in AWS
#        property: DB_PASS # The "Key" in AWS

#                     OR

