apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secret.name }}-db-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: {{ include "orders.secretName" . }}
    
  dataFrom:
  - extract:
      key: prod/orders/postgres # This is the name of your secret in AWS
    
# We can map it like this:
#  data:
